<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/common :: head('カテゴリ管理')}"></head>
<body>
<nav th:replace="~{layout/common :: navbar}"></nav>

<div class="container pb-5">
  <div class="row justify-content-center">
    <div class="col-md-7">
      <div class="aero-window">
        <div class="aero-title-bar fw-bold fs-5">
          <i class="bi bi-tags me-2"></i>カテゴリ管理
        </div>
        <div class="list-group list-group-flush">
          <a class="list-group-item list-group-item-aero d-flex justify-content-between align-items-center py-4 px-4"
             th:each="cat : ${categories}" th:href="@{/categories/{id}(id=${cat.id})}">
            <span class="fs-5 fw-bold" th:text="${cat.name}"></span>
            <span class="btn btn-aero-blue btn-sm">詳細を確認 →</span>
          </a>
        </div>
        <div class="p-4 border-top border-white border-opacity-25">
          <a class="btn btn-aero-blue w-100 py-2" href="javascript:void(0);" 
             onclick="promptNewCategory()">
            <i class="bi bi-plus-circle me-2"></i>新規カテゴリを追加
          </a>
        </div>
      </div>
      <div class="text-center mt-4">
        <a class="btn btn-outline-light px-4" th:href="@{/tasks}">
          <i class="bi bi-arrow-left me-2"></i>タスク一覧に戻る
        </a>
      </div>
    </div>
  </div>
</div>

<script>
  function promptNewCategory() {
    const name = prompt('新規カテゴリ名を入力してください:');
    if (name) {
      fetch('/api/categories', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({name: name})
      }).then(r => r.ok ? location.reload() : alert('エラーが発生しました'));
    }
  }
</script>
</body>
</html>
