<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/common :: head('カテゴリ詳細')}"></head>
<body class="bg-light">
<nav th:replace="~{layout/common :: navbar}"></nav>

<div class="container pb-5">
  <h2 class="mb-4 fw-bold">カテゴリ詳細: <span class="text-primary"
                                               th:text="${category.name}"></span></h2>

  <div class="card shadow-sm border-0 bg-white">
    <div class="card-header bg-dark text-white fw-bold py-3">
      このカテゴリに紐づくタスク一覧
    </div>
    <div class="card-body p-0">
      <table class="table table-hover mb-0">
        <thead class="table-light">
        <tr>
          <th class="ps-4">ID</th>
          <th>タイトル</th>
          <th>期限</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(category.tasks)}">
          <td class="text-center text-muted py-4" colspan="3">
            現在、このカテゴリに紐づくタスクはありません
          </td>
        </tr>
        <tr th:each="task : ${category.tasks}">
          <td class="ps-4 align-middle" th:text="${task.id}"></td>
          <td class="fw-bold align-middle" th:text="${task.title}"></td>
          <td class="align-middle" th:text="${task.dueDate}"></td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="mt-4">
    <a class="btn btn-outline-secondary px-4 me-2" th:href="@{/categories}">カテゴリ一覧へ戻る</a>
    <a class="btn btn-primary px-4" th:href="@{/tasks}">タスク一覧へ戻る</a>
  </div>
</div>
</body>
</html>
