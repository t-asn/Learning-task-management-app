<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>タスク登録・編集</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>
<body>
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow">
        <div class="card-header bg-primary text-white">
          <h3 class="card-title mb-0"
              th:text="${task.id == null} ? '新規タスク登録' : 'タスク編集'"></h3>
        </div>
        <div class="card-body">
          <form method="post" th:action="@{/tasks/save}" th:object="${task}">
            <input th:field="*{id}" type="hidden">

            <div class="mb-3">
              <label class="form-label">カテゴリ</label>
              <select class="form-select" th:errorclass="is-invalid" th:field="*{category}">
                <option value="">選択してください</option>
                <option th:each="cat : ${categories}" th:text="${cat}" th:value="${cat}"></option>
              </select>
              <div class="invalid-feedback" th:errors="*{category}"
                   th:if="${#fields.hasErrors('category')}"></div>
            </div>

            <div class="mb-3">
              <label class="form-label">タイトル</label>
              <input class="form-control" th:errorclass="is-invalid" th:field="*{title}"
                     type="text">
              <div class="invalid-feedback" th:errors="*{title}"
                   th:if="${#fields.hasErrors('title')}"></div>
            </div>

            <div class="mb-3">
              <label class="form-label">期限</label>
              <input class="form-control" th:errorclass="is-invalid" th:field="*{dueDate}"
                     type="date">
              <div class="invalid-feedback">
                <span th:if="${dateErrorMsg}" th:text="${dateErrorMsg}"></span>
                <span th:errors="*{dueDate}"
                      th:if="${dateErrorMsg == null && #fields.hasErrors('dueDate')}"></span>
              </div>
            </div>

            <div class="d-grid gap-2 mt-4">
              <button class="btn btn-primary" th:text="${task.id == null} ? '登録する' : '更新する'"
                      type="submit"></button>
              <a class="btn btn-light border" th:href="@{/tasks}">一覧に戻る</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
