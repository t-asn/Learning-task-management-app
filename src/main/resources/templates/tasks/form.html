<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>タスク登録・編集</title></head>
<body>
<h1 th:text="${task.id == null} ? '新規登録' : 'タスク編集'"></h1>
<form th:action="@{/tasks/save}" th:object="${task}" method="post">
  <input type="hidden" th:field="*{id}">
  <div>タイトル: <input type="text" th:field="*{title}" required></div>
  <div>
    カテゴリ:
    <select th:field="*{category}">
      <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat}"></option>
    </select>
  </div>
  <div>期限: <input type="date" th:field="*{dueDate}" required></div>
  <button type="submit" th:text="${task.id == null} ? '登録する' : '更新する'"></button>
</form>
<br>
<a th:href="@{/tasks}">一覧に戻る</a>
</body>
</html>
