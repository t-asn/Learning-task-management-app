<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>タスク編集 - Aero Ultimate</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
        rel="stylesheet">
  <style>
    html, body {
      background: radial-gradient(circle at 80% 20%, rgba(0, 150, 255, 0.4) 0%, transparent 40%), radial-gradient(circle at 20% 80%, rgba(50, 255, 150, 0.3) 0%, transparent 50%), radial-gradient(circle at center, #1a4a8c 0%, transparent 70%), #0a1a33 !important;
      background-attachment: fixed !important;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #ffffff !important;
      overflow-x: hidden;
    }

    @keyframes windowOpen {
      0% {
        transform: scale(0.8) translateZ(-500px) rotateX(15deg);
        opacity: 0;
        filter: blur(15px);
      }
      100% {
        transform: scale(1) translateZ(0) rotateX(0);
        opacity: 1;
        filter: blur(0);
      }
    }

    .aero-window {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(25px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 12px;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
      margin-top: 3rem;
      animation: windowOpen 0.6s cubic-bezier(0.165, 0.84, 0.44, 1) forwards;
    }

    .aero-title-bar {
      background: linear-gradient(to bottom, rgba(255, 255, 255, 0.4) 0%, rgba(255, 255, 255, 0.1) 100%);
      padding: 15px 25px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px 12px 0 0;
    }

    .form-control, .form-select {
      background: rgba(255, 255, 255, 0.9) !important;
      color: #000 !important;
      font-weight: 500;
    }

    .btn-aero-blue {
      background: linear-gradient(to bottom, #f9fbfd 0%, #76b5e0 48%, #318cc7 49%, #84c5ef 100%);
      border: 1px solid #3c7fb1;
      color: #001d3d !important;
      font-weight: bold;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .btn-aero-blue::after {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 50%;
      height: 100%;
      background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.4), transparent);
      transform: skewX(-25deg);
      transition: 0.5s;
    }

    .btn-aero-blue:hover::after {
      left: 150%;
    }

    .btn-aero-blue:active {
      transform: translateY(2px) scale(0.96);
      box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.5);
    }
  </style>
</head>
<body>
<nav class="navbar navbar-dark" style="background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);">
  <div class="container"><a class="navbar-brand fw-bold" th:href="@{/tasks}">Task Manager</a></div>
</nav>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="aero-window">
        <div class="aero-title-bar fw-bold fs-5"
             th:text="${task.id == null} ? '新規タスク登録' : 'タスク編集'"></div>
        <div class="card-body p-4">
          <form method="post" th:action="@{/tasks/save}" th:object="${task}">
            <input th:field="*{id}" type="hidden">
            <div class="mb-4">
              <label class="form-label small fw-bold text-white shadow-sm">カテゴリ選択</label>
              <select class="form-select" th:field="*{categoryId}">
                <option value="">選択してください</option>
                <option th:each="cat : ${categories}"
                        th:selected="${cat.id == task.categoryId}"
                        th:text="${cat.name}"
                        th:value="${cat.id}">
                </option>
              </select>
              <div class="text-white-50 small mt-1">※カテゴリ一覧から追加・編集も可能です。</div>
            </div>
            <div class="mb-4">
              <label class="form-label small fw-bold text-white shadow-sm">タスク内容</label>
              <input class="form-control" placeholder="入力してください" th:field="*{title}" type="text">
            </div>
            <div class="mb-5">
              <label class="form-label small fw-bold text-white shadow-sm">完了予定日</label>
              <input class="form-control" th:field="*{dueDate}" type="date">
            </div>
            <div class="d-grid gap-3">
              <button class="btn btn-aero-blue btn-lg" th:text="${task.id == null} ? '登録する' : '更新する'"
                      type="submit"></button>
              <a class="btn btn-outline-light btn-sm" th:href="@{/tasks}">一覧に戻る</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
