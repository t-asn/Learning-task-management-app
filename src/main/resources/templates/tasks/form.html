<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/common :: head('タスク管理')}"></head>
<body>
<nav th:replace="~{layout/common :: navbar}"></nav>

<div class="container pb-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="aero-window">
        <div class="aero-title-bar fw-bold fs-5">
          <i class="bi me-2" th:class="${task.id == null} ? 'bi-plus-circle' : 'bi-pencil-square'"></i>
          <span th:text="${task.id == null} ? '新規タスク登録' : 'タスク編集'"></span>
        </div>
        <div class="card-body p-4">
          <form method="post" th:action="@{/tasks/save}" th:object="${task}">
            <input th:field="*{id}" type="hidden">
            <div class="mb-4">
              <label class="form-label small fw-bold text-white">
                <i class="bi bi-tag me-1"></i>カテゴリ選択
              </label>
              <select class="form-select" th:field="*{categoryId}">
                <option value="">選択してください</option>
                <option th:each="cat : ${categories}"
                        th:selected="${cat.id == task.categoryId}"
                        th:text="${cat.name}"
                        th:value="${cat.id}">
                </option>
              </select>
              <div class="text-white-50 small mt-1">※カテゴリ一覧から追加・編集も可能です。</div>
            </div>
            <div class="mb-4">
              <label class="form-label small fw-bold text-white">
                <i class="bi bi-file-text me-1"></i>タスク内容
              </label>
              <input class="form-control" placeholder="入力してください" th:field="*{title}" type="text">
            </div>
            <div class="mb-5">
              <label class="form-label small fw-bold text-white">
                <i class="bi bi-calendar me-1"></i>完了予定日
              </label>
              <input class="form-control" th:field="*{dueDate}" type="date">
            </div>
            <div class="d-grid gap-3">
              <button class="btn btn-aero-blue btn-lg" th:text="${task.id == null} ? '登録する' : '更新する'"
                      type="submit"></button>
              <a class="btn btn-outline-light btn-sm" th:href="@{/tasks}">一覧に戻る</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
