<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/common :: head('タスク一覧')}"></head>
<body>
<nav th:replace="~{layout/common :: navbar}"></nav>

<div class="container pb-5">
  <div class="aero-window">
    <div class="aero-title-bar d-flex justify-content-between align-items-center">
      <h5 class="mb-0 fw-bold"><i class="bi bi-window-stack me-2"></i>タスク一覧</h5>
      <div class="btn-group">
        <a class="btn btn-outline-light btn-sm me-2" th:href="@{/categories}">カテゴリ管理</a>
        <a class="btn btn-aero-blue btn-sm px-4" th:href="@{/tasks/new}">新規登録</a>
      </div>
    </div>
    <div class="table-responsive">
      <table class="table table-aero align-middle">
        <thead>
        <tr>
          <th class="ps-4">ID</th>
          <th>タイトル</th>
          <th>カテゴリ</th>
          <th>状態変更</th>
          <th>期限</th>
          <th class="text-center pe-4">操作</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="task : ${tasks}">
          <td class="ps-4 text-white-50" th:text="${task.id}"></td>
          <td class="fw-bold" th:text="${task.title}"></td>
          <td><span class="badge border border-white border-opacity-50"
                    th:text="${task.categoryName ?: '未分類'}"></span></td>
          <td>
            <div class="btn-group btn-group-sm">
              <a class="btn btn-outline-light"
                 th:classappend="${task.status.name() == 'NOT_STARTED'} ? 'active-status'"
                 th:href="@{/tasks/update-status(taskId=${task.id}, status='NOT_STARTED')}">未</a>
              <a class="btn btn-outline-light"
                 th:classappend="${task.status.name() == 'DOING'} ? 'active-status'"
                 th:href="@{/tasks/update-status(taskId=${task.id}, status='DOING')}">中</a>
              <a class="btn btn-outline-light"
                 th:classappend="${task.status.name() == 'DONE'} ? 'active-status'"
                 th:href="@{/tasks/update-status(taskId=${task.id}, status='DONE')}">済</a>
            </div>
          </td>
          <td th:text="${task.dueDate}"></td>
          <td class="text-center pe-4">
            <a class="btn btn-sm btn-outline-light me-1"
               th:href="@{/tasks/edit(taskId=${task.id})}"><i class="bi bi-pencil"></i></a>
            <a class="btn btn-sm btn-outline-light" th:href="@{/tasks/delete(taskId=${task.id})}"><i
                class="bi bi-trash"></i></a>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
</body>
</html>
