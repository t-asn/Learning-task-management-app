<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/common :: head('タスク一覧')}"></head>
<body class="bg-light container mt-5">
<h1 class="mb-4">学習タスク管理</h1>

<div class="alert alert-info alert-dismissible fade show shadow-sm" th:if="${message}">
  <span th:text="${message}"></span>
  <button class="btn-close" data-bs-dismiss="alert" type="button"></button>
</div>

<div class="d-flex justify-content-between align-items-center mb-3">
  <form class="d-flex align-items-center bg-white p-2 shadow-sm rounded" method="get"
        th:action="@{/tasks}">
    <label class="me-2 small fw-bold">表示件数:</label>
    <select class="form-select form-select-sm" name="size" onchange="this.form.submit()"
            style="width: auto;">
      <option th:each="s : ${ {3, 5, 7} }" th:selected="${s == pageSize}" th:text="${s}"
              th:value="${s}"></option>
    </select>
    <input name="page" type="hidden" value="1">
  </form>
  <a class="btn btn-primary shadow-sm" th:href="@{/tasks/new}">＋ 新規登録</a>
</div>

<div class="table-responsive">
  <table class="table table-hover table-striped shadow-sm bg-white">
    <thead class="table-dark">
    <tr>
      <th>ID</th>
      <th>タイトル</th>
      <th>カテゴリ</th>
      <th>期限</th>
      <th class="text-center">操作</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="task : ${tasks}">
      <td class="align-middle" th:text="${task.id}"></td>
      <td class="fw-bold align-middle" th:text="${task.title}"></td>
      <td class="align-middle"><span class="badge bg-secondary" th:text="${task.category}"></span>
      </td>
      <td class="align-middle" th:text="${task.dueDate}"></td>
      <td class="text-center">
        <a class="btn btn-sm btn-outline-success"
           th:href="@{/tasks/edit(taskId=${task.id})}">編集</a>
        <a class="btn btn-sm btn-outline-danger" onclick="return confirm('本当に削除しますか？')"
           th:href="@{/tasks/delete(taskId=${task.id})}">削除</a>
      </td>
    </tr>
    </tbody>
  </table>
</div>

<div class="d-flex justify-content-between align-items-center mt-4" th:if="${totalCount > 0}">
  <p class="small text-muted mb-0">
    全<span class="fw-bold" th:text="${totalCount}"></span>件中
    <span class="fw-bold" th:text="${startRange}"></span>〜<span class="fw-bold"
                                                                th:text="${endRange}"></span>件目を表示
  </p>
  <nav>
    <ul class="pagination mb-0 shadow-sm">
      <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
        <a class="page-link" th:href="@{/tasks(page=${currentPage - 1}, size=${pageSize})}">前へ</a>
      </li>
      <li class="page-item disabled">
        <span class="page-link bg-light text-dark"
              th:text="${currentPage} + ' / ' + ${totalPages}"></span>
      </li>
      <li class="page-item" th:classappend="${currentPage >= totalPages} ? 'disabled'">
        <a class="page-link" th:href="@{/tasks(page=${currentPage + 1}, size=${pageSize})}">次へ</a>
      </li>
    </ul>
  </nav>
</div>
</body>
</html>
