<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/common :: head('タスク一覧')}"></head>
<body class="bg-light">

<main class="container mt-5">
  <h1 class="mb-4">学習タスク管理</h1>

  <div class="alert alert-info alert-dismissible fade show shadow-sm" role="alert"
       th:if="${message}">
    <span th:text="${message}"></span>
    <button aria-label="Close" class="btn-close" data-bs-dismiss="alert" type="button"></button>
  </div>

  <div class="d-flex justify-content-end mb-3">
    <a class="btn btn-primary shadow-sm" th:href="@{/tasks/new}">＋ 新規タスク登録</a>
  </div>

  <div class="table-responsive">
    <table class="table table-hover table-striped shadow-sm bg-white">
      <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>タイトル</th>
        <th>カテゴリ</th>
        <th>期限</th>
        <th class="text-center">操作</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="task : ${tasks}">
        <td class="align-middle" th:text="${task.id}"></td>
        <td class="fw-bold align-middle" th:text="${task.title}"></td>
        <td class="align-middle">
          <span class="badge bg-secondary" th:text="${task.category}"></span>
        </td>
        <td class="align-middle" th:text="${task.dueDate}"></td>
        <td class="text-center">
          <div class="btn-group">
            <a class="btn btn-sm btn-outline-success"
               th:href="@{/tasks/edit(taskId=${task.id})}">編集</a>
            <a class="btn btn-sm btn-outline-danger" onclick="return confirm('本当に削除しますか？')"
               th:href="@{/tasks/delete(taskId=${task.id})}">削除</a>
          </div>
        </td>
      </tr>
      </tbody>
    </table>
  </div>
</main>
</body>
</html>
