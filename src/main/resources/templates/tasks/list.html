<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/common :: head('タスク一覧')}"></head>
<body>
<nav th:replace="~{layout/common :: navbar}"></nav>

<div class="container pb-5">
  <div class="row justify-content-center mb-4" th:if="${message}">
    <div class="col-md-10">
      <div class="alert alert-success alert-dismissible fade show aero-window" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${message}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>
    </div>
  </div>

  <div class="aero-window">
    <div class="aero-title-bar d-flex justify-content-between align-items-center">
      <h5 class="mb-0 fw-bold"><i class="bi bi-window-stack me-2"></i>タスク一覧</h5>
      <div class="btn-group">
        <a class="btn btn-outline-light btn-sm me-2" th:href="@{/categories}">カテゴリ管理</a>
        <a class="btn btn-aero-blue btn-sm px-4" th:href="@{/tasks/new}">新規登録</a>
      </div>
    </div>
    <div class="table-responsive">
      <table class="table table-aero align-middle">
        <thead>
        <tr>
          <th class="ps-4">ID</th>
          <th th:text="'タイトル'">タイトル</th>
          <th th:text="'カテゴリ'">カテゴリ</th>
          <th th:text="'状態変更'">状態変更</th>
          <th th:text="'期限'">期限</th>
          <th class="text-center pe-4">操作</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="task : ${tasks}">
          <td class="ps-4 text-white-50" th:text="${task.id}"></td>
          <td class="fw-bold" th:text="${task.title}"></td>
          <td><span class="badge border border-white border-opacity-50"
                    th:text="${task.categoryName ?: '未分類'}"></span></td>
          <td>
            <div class="btn-group btn-group-sm">
              <a class="btn btn-outline-light"
                 th:classappend="${task.status.name() == 'TODO'} ? 'active-status'"
                 th:href="@{/tasks/update-status(taskId=${task.id}, status='TODO')}">未</a>
              <a class="btn btn-outline-light"
                 th:classappend="${task.status.name() == 'DOING'} ? 'active-status'"
                 th:href="@{/tasks/update-status(taskId=${task.id}, status='DOING')}">中</a>
              <a class="btn btn-outline-light"
                 th:classappend="${task.status.name() == 'DONE'} ? 'active-status'"
                 th:href="@{/tasks/update-status(taskId=${task.id}, status='DONE')}">済</a>
            </div>
          </td>
          <td th:text="${task.dueDate}"></td>
          <td class="text-center pe-4">
            <a class="btn btn-sm btn-outline-light me-1"
               th:href="@{/tasks/edit(taskId=${task.id})}"><i class="bi bi-pencil"></i></a>
            <a class="btn btn-sm btn-outline-light" th:href="@{/tasks/delete(taskId=${task.id})}"><i
                class="bi bi-trash"></i></a>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- ページネーション -->
  <nav aria-label="Page navigation" class="mt-4" th:if="${totalPages > 1}">
    <ul class="pagination justify-content-center">
      <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
        <a class="page-link aero-window" th:href="@{/tasks(page=${currentPage - 1})}" aria-label="Previous">
          <span aria-hidden="true">&laquo;</span>
        </a>
      </li>
      <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}"
          th:classappend="${i == currentPage} ? 'active'">
        <a class="page-link aero-window" th:href="@{/tasks(page=${i})}" th:text="${i}">1</a>
      </li>
      <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
        <a class="page-link aero-window" th:href="@{/tasks(page=${currentPage + 1})}" aria-label="Next">
          <span aria-hidden="true">&raquo;</span>
        </a>
      </li>
    </ul>
  </nav>
</div>
</body>
</html>
