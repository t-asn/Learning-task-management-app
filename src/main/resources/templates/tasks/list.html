<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>タスク一覧 - Task Management App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
        rel="stylesheet">
  <style>
    body {
      background-color: #f4f7f6;
      font-family: 'Helvetica Neue', Arial, sans-serif;
    }

    .navbar {
      shadow-sm;
    }

    .card {
      border: none;
      border-radius: 0.75rem;
      overflow: hidden;
    }

    .table thead {
      background-color: #f8f9fa;
      border-top: 1px solid #dee2e6;
    }

    .overdue {
      color: #dc3545;
      font-weight: bold;
    }

    .pagination .page-link {
      color: #495057;
    }

    .pagination .active .page-link {
      background-color: #0d6efd;
      border-color: #0d6efd;
      color: white;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold" th:href="@{/tasks}">
      <i class="bi bi-card-checklist me-2"></i>Task Manager
    </a>
  </div>
</nav>

<div class="container">
  <div class="alert alert-success alert-dismissible fade show shadow-sm" role="alert"
       th:if="${message}">
    <i class="bi bi-check-circle-fill me-2"></i>
    <span th:text="${message}">完了メッセージがここに入ります</span>
    <button aria-label="閉じる" class="btn-close" data-bs-dismiss="alert" type="button"></button>
  </div>

  <div class="card shadow-sm">
    <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
      <h5 class="mb-0 text-dark fw-bold">タスク一覧</h5>
      <a class="btn btn-primary" th:href="@{/tasks/new}">
        <i class="bi bi-plus-lg me-1"></i>新規登録
      </a>
    </div>

    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead>
        <tr>
          <th class="ps-4" style="width: 10%;">ID</th>
          <th style="width: 40%;">タイトル</th>
          <th style="width: 15%;">カテゴリ</th>
          <th style="width: 15%;">期限</th>
          <th class="text-center pe-4" style="width: 20%;">操作</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="task : ${tasks}">
          <td class="ps-4 text-muted" th:text="${task.id}">1</td>
          <td>
            <span class="fw-semibold text-dark" th:text="${task.title}">タスク名</span>
          </td>
          <td>
            <span class="badge bg-light text-dark border fw-normal"
                  th:text="${task.categoryId}">1</span>
          </td>
          <td>
            <span
                th:classappend="${task.dueDate.isBefore(T(java.time.LocalDate).now())} ? 'overdue' : ''">
              <i class="bi bi-calendar3 me-1 small"></i>
              <span th:text="${task.dueDate}">2026-01-01</span>
            </span>
          </td>
          <td class="text-center pe-4">
            <div class="btn-group shadow-sm">
              <a class="btn btn-sm btn-white border" th:href="@{/tasks/edit(taskId=${task.id})}"
                 title="編集">
                <i class="bi bi-pencil text-primary"></i>
              </a>
              <a class="btn btn-sm btn-white border"
                 onclick="return confirm('このタスクを削除してもよろしいですか？');"
                 th:href="@{/tasks/delete(taskId=${task.id})}"
                 title="削除">
                <i class="bi bi-trash text-danger"></i>
              </a>
            </div>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(tasks)}">
          <td class="text-center py-5" colspan="5">
            <p class="text-muted mb-0">表示できるタスクがありません。</p>
          </td>
        </tr>
        </tbody>
      </table>
    </div>

    <div class="card-footer bg-white border-top-0 py-3">
      <div class="row align-items-center">
        <div class="col-sm-6 text-center text-sm-start mb-3 mb-sm-0">
          <small class="text-muted">
            全 <span th:text="${totalCount}">0</span> 件中
            <span th:text="${startRange}">0</span> - <span th:text="${endRange}">0</span> 件を表示
          </small>
        </div>
        <div class="col-sm-6">
          <nav aria-label="Page navigation" th:if="${totalPages > 1}">
            <ul class="pagination pagination-sm justify-content-center justify-content-sm-end mb-0">
              <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                <a aria-label="Previous" class="page-link"
                   th:href="@{/tasks(page=${currentPage - 1})}">
                  <span aria-hidden="true">&laquo;</span>
                </a>
              </li>
              <li class="page-item"
                  th:classappend="${i == currentPage} ? 'active'" th:each="i : ${#numbers.sequence(1, totalPages)}">
                <a class="page-link" th:href="@{/tasks(page=${i})}" th:text="${i}">1</a>
              </li>
              <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                <a aria-label="Next" class="page-link" th:href="@{/tasks(page=${currentPage + 1})}">
                  <span aria-hidden="true">&raquo;</span>
                </a>
              </li>
            </ul>
          </nav>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
