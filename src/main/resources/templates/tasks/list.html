<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>タスク一覧 - Task Management App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background-color: #f4f7f6; font-family: 'Helvetica Neue', Arial, sans-serif; }
    .card { border: none; border-radius: 0.75rem; }
    .overdue { color: #dc3545; font-weight: bold; }
    .btn-group-sm .btn { font-size: 0.75rem; padding: 0.25rem 0.5rem; min-width: 60px; }
    .badge-category { background-color: #e9ecef; color: #495057; border: 1px solid #dee2e6; font-weight: 400; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold" th:href="@{/tasks}">
      <i class="bi bi-card-checklist me-2"></i>Task Manager
    </a>
  </div>
</nav>

<div class="container">
  <div class="alert alert-success alert-dismissible fade show shadow-sm" role="alert" th:if="${message}">
    <i class="bi bi-check-circle-fill me-2"></i>
    <span th:text="${message}">メッセージ</span>
    <button aria-label="閉じる" class="btn-close" data-bs-dismiss="alert" type="button"></button>
  </div>

  <div class="card shadow-sm">
    <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
      <h5 class="mb-0 text-dark fw-bold">タスク一覧</h5>
      <div class="btn-group">
        <a class="btn btn-outline-secondary" th:href="@{/categories}">
          <i class="bi bi-tags me-1"></i>カテゴリ管理
        </a>
        <a class="btn btn-primary shadow-sm" th:href="@{/tasks/new}">
          <i class="bi bi-plus-lg me-1"></i>タスク新規登録
        </a>
      </div>
    </div>

    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
        <tr>
          <th class="ps-4" style="width: 8%;">ID</th>
          <th style="width: 20%;">タイトル</th>
          <th style="width: 12%;">カテゴリ</th>
          <th style="width: 30%;">ステータス変更</th>
          <th style="width: 15%;">期限</th>
          <th class="text-center pe-4" style="width: 15%;">操作</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="task : ${tasks}">
          <td class="ps-4 text-muted" th:text="${task.id}">1</td>
          <td><span class="fw-semibold text-dark" th:text="${task.title}">タイトル</span></td>
          <td>
            <span class="badge badge-category" th:text="${task.categoryName ?: '未分類'}">カテゴリ</span>
          </td>
          <td>
            <div class="btn-group btn-group-sm" role="group">
              <a class="btn"
                 th:classappend="${task.status.name() == 'NOT_STARTED'} ? 'btn-secondary disabled' : 'btn-outline-secondary'"
                 th:href="${task.status.name() == 'NOT_STARTED'} ? '#' : @{/tasks/update-status(taskId=${task.id}, status='NOT_STARTED')}">未着手</a>

              <a class="btn"
                 th:classappend="${task.status.name() == 'DOING'} ? 'btn-info text-white disabled' : 'btn-outline-info'"
                 th:href="${task.status.name() == 'DOING'} ? '#' : @{/tasks/update-status(taskId=${task.id}, status='DOING')}">着手</a>

              <a class="btn"
                 th:classappend="${task.status.name() == 'DONE'} ? 'btn-success disabled' : 'btn-outline-success'"
                 th:href="${task.status.name() == 'DONE'} ? '#' : @{/tasks/update-status(taskId=${task.id}, status='DONE')}">完了</a>
            </div>
          </td>
          <td>
            <span th:classappend="${task.dueDate.isBefore(T(java.time.LocalDate).now())} ? 'overdue' : ''">
              <i class="bi bi-calendar3 me-1 small"></i>
              <span th:text="${task.dueDate}">2026-04-17</span>
            </span>
          </td>
          <td class="text-center pe-4">
            <div class="btn-group">
              <a class="btn btn-sm btn-outline-primary" th:href="@{/tasks/edit(taskId=${task.id})}" title="編集">
                <i class="bi bi-pencil"></i>
              </a>
              <a class="btn btn-sm btn-outline-danger" onclick="return confirm('本当に削除しますか？');"
                 th:href="@{/tasks/delete(taskId=${task.id})}" title="削除">
                <i class="bi bi-trash"></i>
              </a>
            </div>
          </td>
        </tr>
        </tbody>
      </table>
    </div>

    <div class="card-footer bg-white border-top-0 py-3">
      <div class="row align-items-center">
        <div class="col-sm-6 text-muted small">
          全 <span th:text="${totalCount}">0</span> 件中
          <span th:text="${startRange}">0</span> - <span th:text="${endRange}">0</span> 件を表示
        </div>
        <div class="col-sm-6">
          <nav aria-label="Page navigation" th:if="${totalPages > 1}">
            <ul class="pagination pagination-sm justify-content-end mb-0">
              <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                <a class="page-link" th:href="@{/tasks(page=${currentPage - 1})}">&laquo;</a>
              </li>
              <li class="page-item" th:classappend="${i == currentPage} ? 'active'"
                  th:each="i : ${#numbers.sequence(1, totalPages)}">
                <a class="page-link" th:href="@{/tasks(page=${i})}" th:text="${i}">1</a>
              </li>
              <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                <a class="page-link" th:href="@{/tasks(page=${currentPage + 1})}">&raquo;</a>
              </li>
            </ul>
          </nav>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
