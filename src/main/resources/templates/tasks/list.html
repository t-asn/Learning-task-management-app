<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/common :: layout(~{::title}, ~{::body})}">
<head>
  <title>タスク一覧</title>
</head>
<body>
<h2 class="mb-4">タスク一覧</h2>

<div th:if="${message}" class="alert alert-success" role="alert">
  <span th:text="${message}"></span>
</div>

<div class="mb-3">
  <a th:href="@{/tasks/new}" class="btn btn-primary">新規登録</a>
</div>

<div th:if="${#lists.isEmpty(tasks)}" class="alert alert-info">
  タスクが登録されていません。
</div>

<div th:if="${!#lists.isEmpty(tasks)}">
  <table class="table table-striped">
    <thead>
    <tr>
      <th>タイトル</th>
      <th>カテゴリ</th>
      <th>期限</th>
      <th>操作</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="task : ${tasks}">
      <td th:text="${task.title}">タイトル</td>
      <td th:text="${task.categoryName}">カテゴリ名</td>
      <td th:text="${task.dueDate}">2024-01-01</td>
      <td>
        <a th:href="@{/tasks/edit(taskId=${task.id})}" class="btn btn-sm btn-outline-secondary">編集</a>
        <a th:href="@{/tasks/delete(taskId=${task.id})}"
           class="btn btn-sm btn-outline-danger"
           onclick="return confirm('本当に削除しますか？')">削除</a>
      </td>
    </tr>
    </tbody>
  </table>

  <div class="d-flex justify-content-between align-items-center">
    <div>
      全 <span th:text="${totalCount}">0</span> 件中
      <span th:text="${startRange}">0</span> - <span th:text="${endRange}">0</span> 件を表示
    </div>

    <nav th:if="${totalPages > 1}" aria-label="Page navigation">
      <ul class="pagination mb-0">
        <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
          <a class="page-link" th:href="@{/tasks(page=${currentPage - 1})}">前へ</a>
        </li>
        <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}"
            th:classappend="${i == currentPage} ? 'active'">
          <a class="page-link" th:href="@{/tasks(page=${i})}" th:text="${i}">1</a>
        </li>
        <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
          <a class="page-link" th:href="@{/tasks(page=${currentPage + 1})}">次へ</a>
        </li>
      </ul>
    </nav>
  </div>
</div>
</body>
</html>
