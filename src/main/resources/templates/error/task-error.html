<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>エラー - タスク管理システム</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet">
  <style>
    .error-container {
      max-width: 600px;
      margin-top: 100px;
    }

    .error-code {
      font-size: 6rem;
      font-weight: bold;
      color: #dc3545;
      line-height: 1;
    }
  </style>
</head>
<body class="bg-light">

<div class="container error-container text-center">
  <div class="card shadow-sm border-0">
    <div class="card-body p-5">
      <div class="error-code mb-3" th:text="${errorTitle}">404</div>

      <h2 class="h4 text-secondary mb-4">リクエストを処理できませんでした</h2>

      <p class="text-muted mb-5" th:text="${errorMessage}">
        エラーの詳細がここに表示されます。
      </p>

      <div class="d-grid gap-2">
        <a class="btn btn-primary btn-lg" th:href="@{/tasks}">
          <i class="bi bi-house-door"></i> 一覧画面へ戻る
        </a>
      </div>
    </div>
  </div>

  <p class="mt-4 text-secondary small">
    &copy; 2026 Task Management System - Sendai Infrastructure Lab.
  </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
