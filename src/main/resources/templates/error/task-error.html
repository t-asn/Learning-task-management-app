<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/common :: head('エラー')}"></head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
<div class="text-center">
  <h1 class="display-1 fw-bold text-danger" th:text="${errorTitle}">Error</h1>
  <h3 class="mb-4">リクエストを処理できませんでした</h3>
  <p class="text-muted mb-4" th:text="${errorMessage}"></p>
  <a class="btn btn-primary btn-lg px-5 shadow-sm" th:href="@{/tasks}">一覧画面へ戻る</a>
</div>
</body>
</html>
