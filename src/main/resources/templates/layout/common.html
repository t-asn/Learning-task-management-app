<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
  <meta charset="UTF-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title th:text="${title} + ' - 学習タスク管理システム'"></title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
        rel="stylesheet">
  <script defer
          src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <style>
    /* Windows 7 Aero Ultimate Theme */
    html, body {
      background: radial-gradient(circle at 80% 20%, rgba(0, 150, 255, 0.4) 0%, transparent 40%),
      radial-gradient(circle at 20% 80%, rgba(50, 255, 150, 0.3) 0%, transparent 50%),
      radial-gradient(circle at center, #1a4a8c 0%, transparent 70%),
      #0a1a33 !important;
      background-attachment: fixed !important;
      min-height: 100vh;
      font-family: 'Segoe UI', 'Meiryo', sans-serif;
      color: #ffffff !important;
      overflow-x: hidden;
    }

    /* Aero Window Animation */
    @keyframes windowOpen {
      0% {
        transform: scale(0.8) translateZ(-500px) rotateX(15deg);
        opacity: 0;
        filter: blur(15px);
      }
      100% {
        transform: scale(1) translateZ(0) rotateX(0);
        opacity: 1;
        filter: blur(0);
      }
    }

    /* Navbar Styling */
    .navbar-aero {
      background: rgba(0, 0, 0, 0.5) !important;
      backdrop-filter: blur(10px) !important;
      -webkit-backdrop-filter: blur(10px) !important;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;
    }

    /* Aero Window */
    .aero-window {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(25px) saturate(180%);
      -webkit-backdrop-filter: blur(25px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-top: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 12px;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
      margin-top: 2rem;
      animation: windowOpen 0.6s cubic-bezier(0.165, 0.84, 0.44, 1) forwards;
      overflow: hidden;
    }

    /* Aero Title Bar */
    .aero-title-bar {
      background: linear-gradient(to bottom, rgba(255, 255, 255, 0.4) 0%, rgba(255, 255, 255, 0.1) 100%);
      padding: 15px 25px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.5);
    }

    /* Aero Table */
    .table-aero {
      --bs-table-bg: rgba(255, 255, 255, 0.1) !important;
      --bs-table-color: #ffffff !important;
      color: #ffffff !important;
      margin-bottom: 0;
    }

    .table-aero td, .table-aero th {
      color: #ffffff !important;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .table-aero tbody tr:hover {
      background: rgba(255, 255, 255, 0.2) !important;
    }

    /* Aero List Items */
    .list-group-item-aero {
      background: rgba(255, 255, 255, 0.1) !important;
      color: #fff !important;
      transition: 0.2s;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;
    }

    .list-group-item-aero:hover {
      background: rgba(255, 255, 255, 0.2) !important;
      transform: translateX(10px);
    }

    .list-group-item-aero:active {
      transform: scale(0.98);
      background: rgba(0, 0, 0, 0.2) !important;
    }

    /* Aero Button Style */
    .btn-aero-blue {
      background: linear-gradient(to bottom, #f9fbfd 0%, #76b5e0 48%, #318cc7 49%, #84c5ef 100%);
      border: 1px solid #3c7fb1;
      color: #001d3d !important;
      font-weight: 600;
      position: relative;
      overflow: hidden;
      transition: all 0.2s;
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.8);
    }

    .btn-aero-blue::after {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 50%;
      height: 100%;
      background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.6), transparent);
      transform: skewX(-25deg);
      transition: 0.5s;
    }

    .btn-aero-blue:hover {
      background: linear-gradient(to bottom, #ffffff 0%, #80c0e8 48%, #328dd7 49%, #8ed0f7 100%);
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3), inset 0 1px 1px rgba(255, 255, 255, 0.8);
    }

    .btn-aero-blue:hover::after {
      left: 150%;
    }

    .btn-aero-blue:active {
      transform: translateY(2px) scale(0.96);
      box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }

    /* Aero Status Button */
    .active-status {
      background: rgba(255, 255, 255, 0.3) !important;
      border-color: #fff !important;
    }

    /* Form Controls */
    .form-control, .form-select {
      background: rgba(255, 255, 255, 0.9) !important;
      color: #000 !important;
      font-weight: 500;
      border: 1px solid rgba(255, 255, 255, 0.3) !important;
    }

    .form-control:focus, .form-select:focus {
      background: rgba(255, 255, 255, 1) !important;
      border-color: #3c7fb1 !important;
      box-shadow: 0 0 0 0.2rem rgba(60, 127, 177, 0.25);
    }

    /* Badge Styling */
    .badge {
      background: rgba(255, 255, 255, 0.15);
      color: #ffffff;
    }

    /* Outline Light Buttons */
    .btn-outline-light {
      color: rgba(255, 255, 255, 0.8) !important;
      border-color: rgba(255, 255, 255, 0.5) !important;
      transition: all 0.2s;
    }

    .btn-outline-light:hover {
      color: #ffffff !important;
      background: rgba(255, 255, 255, 0.1) !important;
      border-color: rgba(255, 255, 255, 0.8) !important;
    }

    .btn-outline-light:active {
      transform: translateY(1px);
    }

    /* Text Color */
    .text-white-50 {
      color: rgba(255, 255, 255, 0.5) !important;
    }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark navbar-aero" th:fragment="navbar">
  <div class="container">
    <a class="navbar-brand fw-bold" th:href="@{/tasks}">
      <i class="bi bi-microsoft me-2"></i>学習タスク管理システム
    </a>
    <button aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation"
            class="navbar-toggler" data-bs-target="#navbarNav" data-bs-toggle="collapse"
            type="button">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" th:href="@{/tasks}">
            <i class="bi bi-list-check me-1"></i>タスク一覧
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:href="@{/categories}">
            <i class="bi bi-tags me-1"></i>カテゴリ管理
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>
</body>
</html>
